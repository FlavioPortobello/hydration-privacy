<!DOCTYPE html>
<html>
<head>
  <title>WHOOP Login...</title>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    
    if (code) {
      window.location.href = 'com.hydrationapp://oauth?code=' + code;
    } else if (error) {
      document.getElementById('msg').innerText = 'Fehler: ' + error;
    }
  </script>
</head>
<body>
  <p id="msg">Wird weitergeleitet...</p>
</body>
</html>
